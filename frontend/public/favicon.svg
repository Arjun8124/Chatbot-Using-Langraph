<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6e9df2"/>
      <stop offset="100%" stop-color="#5a8dee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a8dee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5a8dee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Subtle glow behind the bulb -->
  <circle cx="256" cy="210" r="120" fill="url(#glow)"/>
  
  <!-- Lightbulb body -->
  <path d="M256 100c-60.75 0-110 49.25-110 110 0 37.4 18.7 70.3 47.2 90.2V340a32 32 0 0 0 32 32h61.6a32 32 0 0 0 32-32v-39.8c28.5-19.9 47.2-52.8 47.2-90.2 0-60.75-49.25-110-110-110z" 
        fill="none" stroke="url(#accent)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Bulb base lines -->
  <line x1="210" y1="385" x2="302" y2="385" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <line x1="225" y1="415" x2="287" y2="415" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Inner filament / AI brain dots -->
  <circle cx="230" cy="200" r="10" fill="#5a8dee" opacity="0.8"/>
  <circle cx="282" cy="200" r="10" fill="#5a8dee" opacity="0.8"/>
  <circle cx="256" cy="240" r="10" fill="#5a8dee" opacity="0.8"/>
  
  <!-- Connecting lines (neural network style) -->
  <line x1="230" y1="200" x2="256" y2="240" stroke="#5a8dee" stroke-width="4" opacity="0.5"/>
  <line x1="282" y1="200" x2="256" y2="240" stroke="#5a8dee" stroke-width="4" opacity="0.5"/>
  <line x1="230" y1="200" x2="282" y2="200" stroke="#5a8dee" stroke-width="4" opacity="0.5"/>
</svg>